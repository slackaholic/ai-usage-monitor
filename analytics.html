<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Usage Analytics</title>
  <style>
    :root {
      --bg:           #0f1117;
      --surface:      #1a1d2e;
      --surface2:     #0f1117;
      --border:       #2d3148;
      --border2:      #1e2235;
      --text:         #e2e8f0;
      --text-mid:     #94a3b8;
      --text-muted:   #64748b;
      --text-dim:     #475569;
      --text-faint:   #374151;
      --accent:       #a78bfa;
      --accent-deep:  #4c1d95;
      --accent-med:   #7c3aed;
      --green:        #34d399;
      --red:          #f87171;
      --amber:        #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 0;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .header-meta {
      font-size: 10px;
      color: var(--text-mid);
    }

    /* ── Tabs ───────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
    }
    .tab {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-mid);
      border: none;
      background: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.3px;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active { color: var(--accent); background: var(--bg); border-bottom: 2px solid var(--accent); }

    /* ── Controls bar ───────────────────────────────────────────────────── */
    .controls {
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .controls label { font-size: 10px; color: var(--text-mid); text-transform: uppercase; letter-spacing: .5px; }
    .controls select {
      background: #2d3148; border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 10px; padding: 2px 6px; outline: none; cursor: pointer;
    }
    .controls select:hover { background: #3d4168; }
    .refresh-btn {
      margin-left: auto;
      background: var(--accent-deep); border: none; border-radius: 5px;
      color: var(--accent); font-size: 11px; padding: 4px 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--accent-med); color: #fff; }

    /* ── Body ───────────────────────────────────────────────────────────── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .body::-webkit-scrollbar { width: 5px; }
    .body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Stat grid ──────────────────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat-card .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-mid);
      margin-bottom: 4px;
    }
    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-card .sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .stat-card.green .value { color: var(--green); }
    .stat-card.red   .value { color: var(--red); }
    .stat-card.amber .value { color: var(--amber); }
    .stat-card.dim   .value { color: var(--text-mid); font-size: 14px; }

    /* ── Section header ─────────────────────────────────────────────────── */
    .section-head {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

    /* ── Sparkline panel ────────────────────────────────────────────────── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .chart-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .chart-legend {
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 10px;
      color: var(--text-mid);
    }
    .legend-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* ── Log table ──────────────────────────────────────────────────────── */
    .log-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    thead { background: var(--surface2); }
    th {
      padding: 6px 10px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-mid);
      font-weight: 700;
      border-bottom: 1px solid var(--border2);
    }
    td {
      padding: 5px 10px;
      color: var(--text);
      border-bottom: 1px solid var(--border2);
      font-variant-numeric: tabular-nums;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    td.mono { font-family: 'Consolas', 'SF Mono', monospace; font-size: 10px; }
    td.accent { color: var(--accent); font-weight: 600; }
    td.green  { color: var(--green);  font-weight: 600; }
    td.red    { color: var(--red);    font-weight: 600; }
    td.depleted { background: rgba(248,113,113,0.06); }

    /* ── Empty / loading ────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      padding: 40px 0;
    }
    /* ── Efficiency charts ──────────────────────────────────────────────── */
    .eff-sub { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-mid); margin: 14px 0 6px; }
    .eff-hist { font-size: 13px; margin-bottom: 6px; }
    .eff-note { font-size: 10px; color: var(--text-mid); margin-top: 4px; }
    .eff-cap { font-size: 10px; color: var(--text-mid); margin: 8px 0 4px; }
    .eff-peaks, .eff-heat { margin: 4px 0; }
    .peak-bars { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
    .peak-bar { flex: 1; min-width: 2px; border-radius: 1px 1px 0 0; }
    .heat-row { display: flex; gap: 2px; }
    .heat-cell { flex: 1; height: 14px; border-radius: 2px; font-size: 8px; color: rgba(255,255,255,.5); display: flex; align-items: center; justify-content: center; }
    /* self-describing scaffolding for the two efficiency history charts */
    .eff-subtle { color: var(--text-dim); text-transform: none; letter-spacing: 0; }
    .peak-legend, .heat-legend { display: flex; align-items: center; gap: 12px; font-size: 9px; color: var(--text-mid); margin: 2px 0 4px; }
    .peak-legend .sw { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    .sw.green { background: var(--green); } .sw.amber { background: var(--amber); } .sw.red { background: var(--red); }
    .peak-chart { position: relative; height: 64px; border-bottom: 1px solid var(--border); }
    .peak-chart .peak-bars { height: 100%; position: relative; z-index: 1; }
    .peak-grid { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--border2); z-index: 0; }
    .peak-grid span { position: absolute; right: 0; top: -6px; font-size: 8px; color: var(--text-muted); background: var(--bg); padding: 0 3px; }
    .peak-axis { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); margin-top: 3px; }
    .peak-dates { display: flex; gap: 2px; margin-top: 3px; }
    .peak-dates span { flex: 1; min-width: 2px; font-size: 8px; color: var(--text-muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hour-axis { display: flex; gap: 2px; margin-top: 2px; }
    .hour-axis span { flex: 1; min-width: 2px; font-size: 8px; color: var(--text-muted); text-align: left; }
    .heat-cell.empty { background: rgba(168,85,247,.07); } /* faint 'least' shade, not a hollow outline — reads uniform next to filled cells */
    .heat-legend .grad { display: inline-block; width: 60px; height: 8px; border-radius: 2px; background: linear-gradient(90deg, rgba(168,85,247,.12), rgba(168,85,247,1)); }
    .eff-month { margin: 8px 0 4px; }
    .eff-month > summary { cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-mid); padding: 4px 0; }
    .month-row { display: flex; gap: 2px; align-items: center; margin-bottom: 2px; }
    .month-date { flex: 0 0 44px; font-size: 9px; color: var(--text-mid); text-align: right; padding-right: 4px; }
    .month-row .heat-cell { flex: 1; height: 12px; border-radius: 2px; }
    .month-ruler .month-hcol { flex: 1; font-size: 8px; color: var(--text-mid); text-align: left; }
    .heat-cell.nodata { background: transparent; box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
    .nodata-row .month-date { opacity: .4; }
    .month-nav { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin: 6px 0 8px; }
    .month-btn { background: rgba(168,85,247,0.15); color: var(--text-mid); border: none; border-radius: 4px; padding: 2px 9px; cursor: pointer; font-size: 12px; line-height: 1.4; }
    .month-btn:hover:not(:disabled) { background: var(--accent-med); color: #fff; }
    .month-btn:disabled { opacity: .3; cursor: default; }
    .month-label { font-size: 12px; color: #fff; min-width: 110px; text-align: center; }
    .cost-headline { font-size: 18px; font-weight: 600; color: #fff; margin: 6px 0 2px; }
    .cost-rate { font-size: 15px; font-weight: 600; margin: 10px 0 2px; color: var(--text); }
    .cost-sub { font-size: 11px; color: var(--text-mid); margin: 2px 0; }
    .token-mix-bar { display: flex; width: 100%; height: 8px; border-radius: 4px; overflow: hidden; margin: 6px 0; }
    .token-mix-seg { height: 100%; }
    .cost-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
    .cost-table th, .cost-table td { text-align: left; padding: 3px 8px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .cost-table th { color: var(--text-mid); font-weight: 500; }
    .price-input { width: 56px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); color: #fff; border-radius: 4px; padding: 1px 4px; font-size: 11px; }
    .best-value { color: var(--green); font-weight: 600; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">AI Usage Analytics</div>
    <div class="header-meta" id="header-meta">Loading…</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-account="codex">Codex</button>
    <button class="tab" data-account="claude-desktop">Claude Desktop</button>
    <button class="tab" data-account="claude-vscode">Claude Code</button>
  </div>
</div>

<div class="controls">
  <label>Window</label>
  <select id="window-select">
    <option value="0">All time</option>
    <option value="3">Last 3 h</option>
    <option value="6">Last 6 h</option>
    <option value="12">Last 12 h</option>
    <option value="24" selected>Last 24 h</option>
    <option value="48">Last 48 h</option>
    <option value="168">Last 7 d</option>
  </select>
  <label style="margin-left:12px">Rows</label>
  <select id="rows-select">
    <option value="50">50</option>
    <option value="200" selected>200</option>
    <option value="500">500</option>
    <option value="0">All</option>
  </select>
  <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
</div>

<div class="body" id="body">
  <div class="empty" id="loading">Loading…</div>
</div>

<script src="metrics.js"></script>
<script src="analytics-renderer.js"></script>
</body>
</html>
